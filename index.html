<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Cards</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:50px 20px;
}

header h1{
font-size:3rem;
margin-bottom:10px;
}

header p{
color:#94a3b8;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:50px 20px;
}

.card{
width:320px;
padding:30px;
border-radius:20px;
transition:.3s;
box-shadow:0 10px 30px rgba(0,0,0,.4);
text-align:center;
}

.card:hover{
transform:translateY(-10px);
}

.classic{
background:linear-gradient(135deg,#1e293b,#334155);
}

.gold{
background:linear-gradient(135deg,#b8860b,#ffd700);
color:black;
}

.diamond{
background:linear-gradient(135deg,#00c6ff,#0072ff);
}

.card h2{
font-size:2rem;
margin-bottom:15px;
}

.preco{
font-size:3rem;
font-weight:bold;
margin:20px 0;
}

ul{
list-style:none;
margin-bottom:25px;
}

ul li{
margin:10px 0;
font-size:18px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:1rem;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
opacity:.9;
}

.classic button{
background:#64748b;
color:white;
}

.gold button{
background:black;
color:white;
}

.diamond button{
background:white;
color:#0072ff;
}
</style>
</head>

<body>

<header>
<h1>Elite Cards</h1>
<p>Escolha o cartão ideal para você.</p>
</header>

<section class="cards">

<div class="card classic">
<h2>Classic</h2>

<div class="preco">R$25</div>

<ul>
<li>✔limete basico, ate R$300</li>
</ul>

<a href="https://wa.me/5544998167018" target="_blank">
<button>Comprar Agora</button>
</a>
</div>

<div class="card gold">
<h2>Gold</h2>

<div class="preco">R$120</div>

<ul>
<li>✔ limites mais avançados, chega ate R$800</li>
</ul>

<a href="https://wa.me/5544998167018" target="_blank">
<button>Comprar Agora</button>
</a>
</div>

<div class="card diamond">
<h2>Diamond</h2>

<div class="preco">R$210</div>

<ul>
<li>✔ limite VIP- chega ate R$3k</li>
</ul>

<a href="https://wa.me/5544998167018" target="_blank">
<button>Comprar Agora</button>
</a>
</div>

</section>

</body>
</html>
